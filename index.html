<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Digital</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="login-container">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">
        <button id="btn-login">Entrar</button>
        <button id="btn-register">Cadastrar</button>
      </div>
  <div id="dashboard" style="display:none;">
    <header>Conta</header>
    <div class="saldo" id="saldo">R$ 0,00</div>

    <div class="buttons">
      <div class="button" onclick="acao('Área Pix')">
        <div class="button-circle"><i class="fas fa-qrcode"></i></div>
        <span>Área Pix</span>
      </div>
      <div class="button" onclick="acao('Pagar')">
        <div class="button-circle"><i class="fas fa-barcode"></i></div>
        <span>Pagar</span>
      </div>
      <div class="button" onclick="acao('Empréstimo')">
        <div class="button-circle"><i class="fas fa-money-bill-wave"></i></div>
        <span>Pegar emprestado</span>
      </div>
      <div class="button" onclick="acao('Transferir')">
        <div class="button-circle"><i class="fas fa-arrow-right-arrow-left"></i></div>
        <span>Transferir</span>
      </div>
    </div>

    <div class="card" id="cartao">
      <h3>Cartão de crédito</h3>
      <p>Fatura atual: R$ 0,00</p>
      <p>Limite disponível: R$ 0,00</p>
    </div>

    <div class="card" id="emprestimo">
      <h3>Empréstimo</h3>
      <p>Valor disponível de até R$ 50.000,00</p>
    </div>

    <div class="fab" onclick="alert('Ação rápida clicada')">
      <i class="fas fa-arrows-up-down-left-right"></i>
    </div>
  </div>
</body>
</html>
